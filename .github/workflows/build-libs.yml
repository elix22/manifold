name: Build Manifold Libraries

on:
  push:
    branches: [ sokol-dev ]
  pull_request:
    branches: [ sokol-dev ]
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write  # Allow workflow to push commits back to repository

jobs:
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Build Release
      shell: pwsh
      run: |
        cd scripts
        .\build-manifoldc-windows.ps1

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-x64
        path: libs/windows/**/*
        retention-days: 30

  build-macos:
    name: Build macOS (arm64 + x86_64)
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Build Release
      run: |
        cd scripts
        chmod +x build-manifoldc-macos.sh
        # Pass "Release" explicitly — $1 is BUILD_TYPE, not arch.
        # The script builds both arm64 and x86_64 internally.
        ./build-manifoldc-macos.sh Release

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-all
        path: libs/macos/**/*
        retention-days: 30

  build-linux:
    name: Build Linux (X64)
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake

    - name: Build Release
      run: |
        cd scripts
        chmod +x build-manifoldc-linux.sh
        ./build-manifoldc-linux.sh

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-X64
        path: libs/linux/**/*
        retention-days: 30

  build-web:
    name: Build Web (Emscripten)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Emscripten
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: '3.1.34'

    - name: Build Release
      run: |
        cd scripts
        chmod +x build-manifoldc-web.sh
        ./build-manifoldc-web.sh

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: emscripten-x86
        path: libs/emscripten/**/*
        retention-days: 30

  build-android:
    name: Build Android (All ABIs)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK
      run: |
        echo "Installing Android NDK..."
        sdkmanager --install "ndk;27.2.12479018"
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

    - name: Build Release (All ABIs)
      run: |
        cd scripts
        chmod +x build-manifoldc-android-all.sh
        ./build-manifoldc-android-all.sh

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-all
        path: libs/android/**/*
        retention-days: 30

  build-ios:
    name: Build iOS (arm64)
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Build Release
      run: |
        cd scripts
        chmod +x build-manifoldc-ios.sh
        ./build-manifoldc-ios.sh

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ios-arm64
        path: libs/ios/**/*
        retention-days: 30

  # Combine all artifacts
  combine-artifacts:
    name: Combine All Manifold Libraries
    needs: [build-windows, build-macos, build-linux, build-web, build-android, build-ios]
    runs-on: ubuntu-latest
    if: |
      always() &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') &&
      (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped') &&
      (needs.build-linux.result == 'success' || needs.build-linux.result == 'skipped') &&
      (needs.build-web.result == 'success' || needs.build-web.result == 'skipped') &&
      (needs.build-android.result == 'success' || needs.build-android.result == 'skipped') &&
      (needs.build-ios.result == 'success' || needs.build-ios.result == 'skipped')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Reorganize artifacts
      run: |
        # Create final structure
        mkdir -p combined-libs/windows/x64/release
        mkdir -p combined-libs/macos/release
        mkdir -p combined-libs/linux/X64/release
        mkdir -p combined-libs/emscripten/x86/release
        mkdir -p combined-libs/android
        mkdir -p combined-libs/ios/release

        # Copy Windows artifacts
        if [ -d "artifacts/windows-x64" ]; then
          cp -r artifacts/windows-x64/* combined-libs/windows/ || true
        fi

        # Copy macOS artifacts (arm64 and x86_64 built together in one job)
        if [ -d "artifacts/macos-all" ]; then
          cp -r artifacts/macos-all/* combined-libs/macos/ || true
        fi

        # Copy Linux artifacts
        if [ -d "artifacts/linux-X64" ]; then
          cp -r artifacts/linux-X64/* combined-libs/linux/ || true
        fi

        # Copy Web artifacts
        if [ -d "artifacts/emscripten-x86" ]; then
          cp -r artifacts/emscripten-x86/* combined-libs/emscripten/ || true
        fi

        # Copy Android artifacts (all ABIs)
        if [ -d "artifacts/android-all" ]; then
          cp -r artifacts/android-all/* combined-libs/android/ || true
        fi

        # Copy iOS artifacts
        if [ -d "artifacts/ios-arm64" ]; then
          cp -r artifacts/ios-arm64/* combined-libs/ios/ || true
        fi

        # Show final structure
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "📦 Final artifact structure:"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        find combined-libs -type f | sort

    - name: Upload combined artifacts
      uses: actions/upload-artifact@v4
      with:
        name: manifold-libraries-all-platforms
        path: combined-libs/**/*
        retention-days: 90

    - name: Commit libraries to repository
      if: github.ref == 'refs/heads/sokol-dev' && github.event_name == 'push'
      run: |
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "📝 Preparing to commit libraries..."
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

        # Configure git
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Remove libs from git tracking and filesystem
        git rm -rf libs/ || true

        # Copy new libraries
        mkdir -p libs
        cp -r combined-libs/* libs/

        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "📦 Staging library changes..."
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        git add -f -v libs/

        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "🔍 Checking staged changes..."
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        git diff --cached --stat

        echo ""
        echo "✓ Preparing to commit libraries (force commit to ensure all platforms are updated)..."
        echo ""

        # Create commit message with details
        echo "Auto-update manifold libraries [skip ci]" > commit_msg.txt
        echo "" >> commit_msg.txt
        echo "Built from commit: ${{ github.sha }}" >> commit_msg.txt
        echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> commit_msg.txt
        echo "" >> commit_msg.txt
        echo "Updated libraries:" >> commit_msg.txt

        # List what was updated (or mark all platforms if no git changes detected)
        if git diff --cached --quiet; then
          echo "  - All platforms (forced update)" >> commit_msg.txt
        else
          git diff --cached --name-only | while read file; do
            echo "  - $file" >> commit_msg.txt
          done
        fi

        git commit --allow-empty -F commit_msg.txt

        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "⬆️  Pushing changes to repository..."
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        git push origin sokol-dev

        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "✅ Manifold libraries committed and pushed successfully"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
